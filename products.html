<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Style Haven</title>
    <meta name="description" content="Browse Style Haven clothing products by category, including men, women, kids, and ethnic wear.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        Free Shipping on Selected Orders | Cash on Delivery Available
    </div>

    <header class="navbar">
        <a href="index.html" class="logo" aria-label="Style Haven Home">
            STYLE <span>HAVEN</span>
        </a>

        <nav id="navMenu" aria-label="Main navigation">
            <a href="index.html">Home</a>
            <a href="wishlist.html">Wishlist <span id="wishlistCount" class="wishlist-count">0</span></a>
            <a href="products.html" class="active">Products</a>
            <a href="index.html#collections">Collections</a>
            <a href="index.html#about">About</a>
            <a href="index.html#contact">Contact</a>
        </nav>

        <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false">
            ☰
        </button>
    </header>

    <main>
        <section class="page-hero">
            <p class="section-label">Our Collection</p>
            <h1>Shop Products</h1>
            <p>Find your favorite styles and order quickly through WhatsApp.</p>
        </section>

        <section class="section">
            <div class="filter-bar" id="filterBar" aria-label="Product category filters">
                <button class="filter-btn active" data-category="All">All</button>
                <button class="filter-btn" data-category="Men">Men</button>
                <button class="filter-btn" data-category="Women">Women</button>
                <button class="filter-btn" data-category="Kids">Kids</button>
                <button class="filter-btn" data-category="Ethnic Wear">Ethnic Wear</button>
            </div>

            <div class="product-grid" id="productGrid"></div>
        </section>
    </main>

    <footer>
        <p>© 2026 Style Haven. All rights reserved.</p>
    </footer>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
