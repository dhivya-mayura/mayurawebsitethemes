<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Style Haven</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
    <div class="logo">STYLE <span>HAVEN</span></div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">Collections</a>
      <a href="#">New Arrivals</a>
      <a href="#">Contact</a>
    </nav>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </header>

  <section class="hero">
    <div class="hero-content">
      <p class="tagline">New Collection 2026</p>
      <h1>Elevate Your Everyday Style</h1>
      <p class="subtitle">
        Discover modern, comfortable, and stylish clothing made for every occasion.
      </p>

      <div class="hero-buttons">
        <button onclick="shopNow()">Shop Now</button>
        <button class="outline">Explore Collection</button>
      </div>
    </div>
  </section>

  <section class="features">
    <div>
      <h3>Free Shipping</h3>
      <p>On selected orders</p>
    </div>
    <div>
      <h3>Quality Guarantee</h3>
      <p>Premium clothing</p>
    </div>
    <div>
      <h3>Easy Returns</h3>
      <p>Simple return policy</p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
